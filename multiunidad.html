<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplicación x10, 100, 1000 - Lateral</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            width: 95%; max-width: 850px; height: 90vh;
            background: #ffffff; border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative; display: flex; flex-direction: column;
        }
        
        .game-wrapper {
            display: flex; flex: 1; gap: 40px; align-items: center;
        }

        .seccion-izquierda {
            flex: 1.3; display: flex; flex-direction: column; justify-content: center;
        }

        .seccion-derecha {
            flex: 0.7; display: flex; justify-content: center;
        }

        .btn-home {
            position: absolute; top: 15px; right: 15px;
            background: #f44336; color: white; border: none;
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
        }

        .instruccion {
            background: #eff6ff; color: #1e3a8a; padding: 12px;
            border-radius: 12px; text-align: center; margin-bottom: 25px;
            font-weight: bold; border: 1px solid #bfdbfe; font-size: 1.1rem;
        }

        .operacion-horizontal {
            font-size: 3.2rem; font-weight: 800; color: #1e3a8a;
            text-align: center; margin-bottom: 25px; padding: 25px;
            background: #f8fafc; border-radius: 20px; border: 3px dashed #cbd5e1;
        }

        .input-libre {
            font-size: 3.5rem; width: 100%; min-height: 100px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 6px solid #1e3a8a; color: #1e3a8a; font-weight: bold;
        }
        .placeholder { color: #cbd5e1; font-size: 1.8rem; }

        /* Teclado Calculadora */
        .teclado {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 100%; max-width: 300px;
            background: #f1f5f9; padding: 20px; border-radius: 24px;
        }

        .tecla {
            aspect-ratio: 1/1; font-size: 1.8rem; border: none; border-radius: 15px;
            background: #fff; color: #334155; font-weight: 700; 
            cursor: pointer; box-shadow: 0 4px 0 #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.1s;
        }
        .tecla:active { transform: translateY(3px); box-shadow: 0 1px 0 #cbd5e1; }
        
        .tecla-operacion { background: #f8fafc; color: #3b82f6; }
        .tecla-del { background: #fee2e2; color: #dc2626; font-size: 1.3rem; }
        .tecla-check { 
            grid-column: span 3; background: #3b82f6; color: white;
            height: 70px; font-size: 1.4rem; margin-top: 10px;
            box-shadow: 0 5px 0 #1d4ed8; aspect-ratio: auto;
        }
        .tecla-check:active { box-shadow: 0 1px 0 #1d4ed8; }

        .pantalla { display: none; height: 100%; width: 100%; }
        .pantalla.active { display: flex; flex-direction: column; }

        .btn-nivel { 
            width: 100%; padding: 25px; margin: 12px 0; border: none; 
            border-radius: 18px; color: white; font-weight: bold; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: 0.2s;
        }
        .btn-nivel:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .incorrecto { animation: shake 0.4s; color: #dc2626 !important; border-color: #dc2626 !important; }

        #modal-victoria {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.98);
            z-index: 200; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 24px; text-align: center; padding: 20px;
        }

        @media (max-width: 700px) {
            .game-wrapper { flex-direction: column; gap: 20px; }
            .container { height: 98vh; padding: 15px; }
            .operacion-horizontal { font-size: 2.2rem; padding: 15px; }
            .input-libre { font-size: 2.5rem; min-height: 70px; }
            .teclado { padding: 10px; gap: 8px; }
            .tecla { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="main-index.html" class="btn-home">🏠</a>

        <div id="menu" class="pantalla active" style="justify-content: center;">
            <h1 style="text-align:center; color:#1e3a8a; margin-bottom: 40px; font-size: 2rem;">Multiplicaciones x10, x100, x1000</h1>
            <button class="btn-nivel" style="background:#3b82f6" onclick="iniciar(1)">NIVEL 1<br><small style="font-weight: normal; font-size: 0.9rem;">Números Naturales</small></button>
            <button class="btn-nivel" style="background:#06b6d4" onclick="iniciar(2)">NIVEL 2<br><small style="font-weight: normal; font-size: 0.9rem;">Números Decimales</small></button>
        </div>

        <div id="juego" class="pantalla">
            <div id="instruccion" class="instruccion">Multiplica: añade ceros o mueve la coma</div>
            
            <div class="game-wrapper">
                <div class="seccion-izquierda">
                    <div id="horizontal" class="operacion-horizontal"></div>
                    <div id="input-res" class="input-libre"></div>
                </div>

                <div class="seccion-derecha">
                    <div class="teclado">
                        <button class="tecla" onclick="inputNum(7)">7</button>
                        <button class="tecla" onclick="inputNum(8)">8</button>
                        <button class="tecla" onclick="inputNum(9)">9</button>
                        <button class="tecla" onclick="inputNum(4)">4</button>
                        <button class="tecla" onclick="inputNum(5)">5</button>
                        <button class="tecla" onclick="inputNum(6)">6</button>
                        <button class="tecla" onclick="inputNum(1)">1</button>
                        <button class="tecla" onclick="inputNum(2)">2</button>
                        <button class="tecla" onclick="inputNum(3)">3</button>
                        <button class="tecla tecla-operacion" onclick="inputNum(',')">,</button>
                        <button class="tecla" onclick="inputNum(0)">0</button>
                        <button class="tecla tecla-del" onclick="borrar()">⌫</button>
                        <button class="tecla tecla-check" onclick="validar()">LISTO ✓</button>
                    </div>
                </div>
            </div>
            
            <button style="background:none; border:none; color:#94a3b8; margin-top:20px; cursor:pointer; text-decoration:underline; font-weight: 600;" onclick="location.reload()">VOLVER AL MENÚ</button>
        </div>

        <div id="modal-victoria">
            <div style="font-size: 5rem; margin-bottom: 10px;">🌟</div>
            <h2 style="color: #3b82f6; font-size: 2.2rem; margin-bottom: 15px;">¡Excelente!</h2>
            <div id="mensaje-final" style="margin-bottom: 30px; font-size: 1.8rem; color: #334155;"></div>
            <button class="btn-nivel" style="background:#10b981; max-width: 300px;" onclick="siguiente()">Siguiente ejercicio</button>
        </div>
    </div>

    <script>
        let nivelActual = 1;
        let n1, n2, resCorrecto;

        function iniciar(n) {
            nivelActual = n;
            document.getElementById('menu').classList.remove('active');
            document.getElementById('juego').classList.add('active');
            generar();
        }

        function generar() {
            const display = document.getElementById('input-res');
            display.innerHTML = '<span class="placeholder">¿Resultado?</span>';
            display.classList.remove('incorrecto');
            document.getElementById('modal-victoria').style.display = "none";

            const potencias = [10, 100, 1000];
            n2 = potencias[Math.floor(Math.random() * potencias.length)];
            
            if (nivelActual === 1) {
                // Naturales: n1 entre 10 y 999
                n1 = Math.floor(Math.random() * 990) + 10;
                resCorrecto = (n1 * n2).toString().replace('.', ',');
            } else {
                // Decimales: n1 con un decimal
                let base = (Math.random() * 95 + 5).toFixed(1);
                n1 = base.replace('.', ',');
                let calc = parseFloat(base) * n2;
                // Formateamos para evitar errores de precisión de punto flotante
                resCorrecto = Number(calc.toFixed(2)).toString().replace('.', ',');
            }
            
            document.getElementById('horizontal').textContent = `${n1} x ${n2}`;
        }

        function inputNum(v) {
            const display = document.getElementById('input-res');
            if (display.querySelector('.placeholder')) display.textContent = "";
            display.classList.remove('incorrecto');
            
            if (v === ',') {
                if (!display.textContent.includes(',')) {
                    display.textContent = display.textContent === "" ? "0," : display.textContent + ",";
                }
            } else {
                if (display.textContent.length < 15) display.textContent += v;
            }
        }

        function borrar() {
            const display = document.getElementById('input-res');
            if (display.querySelector('.placeholder')) return;
            display.textContent = display.textContent.slice(0, -1);
            if (display.textContent === "") display.innerHTML = '<span class="placeholder">¿Resultado?</span>';
        }

        function validar() {
            const display = document.getElementById('input-res');
            let userVal = display.querySelector('.placeholder') ? "" : display.textContent;
            
            if (userVal !== "") {
                // Normalizar para comparar (cambiar coma por punto y convertir a número)
                let userNorm = Number(userVal.replace(',', '.'));
                let correctNorm = Number(resCorrecto.replace(',', '.'));

                if (userNorm === correctNorm) {
                    document.getElementById('mensaje-final').innerHTML = `${n1} x ${n2} = <br><strong>${resCorrecto}</strong>`;
                    document.getElementById('modal-victoria').style.display = "flex";
                } else {
                    display.classList.add('incorrecto');
                    setTimeout(() => display.classList.remove('incorrecto'), 450);
                }
            }
        }

        function siguiente() { 
            generar(); 
        }
    </script>
</body>
</html>
