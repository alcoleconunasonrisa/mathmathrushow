<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Bomb Jack - Tablas Edition</title>
    <style>
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            text-align: center; font-family: 'Courier New', Courier, monospace; 
            background: #050510; color: #00d2ff; margin: 0; 
            overflow: hidden; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }
        
        canvas { 
            background: #0a0a1a; border: 2px solid #1e272e; 
            display: block; margin: 0 auto; 
            max-width: 95%; max-height: 60vh; 
            object-fit: contain;
        }

        .hud { 
            font-size: 16px; padding: 5px; 
            background: rgba(30, 39, 46, 0.9); 
            display: flex; justify-content: space-around; align-items: center; 
            flex-wrap: wrap; z-index: 10;
        }

        .target { color: #f9d423; font-size: 22px; font-weight: bold; text-shadow: 0 0 10px rgba(249, 212, 35, 0.5); }
        .level-tag { color: #ff3f34; font-weight: bold; }
        .home-btn { text-decoration: none; font-size: 20px; background: #1e272e; padding: 4px 10px; border-radius: 8px; border: 1px solid #00d2ff; color: #00d2ff; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.98); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; overflow-y: auto;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; }
        .submenu-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 90%; }
        
        .btn-mode { padding: 12px; font-size: 14px; background: #1e272e; color: #00d2ff; border: 2px solid #00d2ff; border-radius: 10px; font-weight: bold; }
        .btn-sub { padding: 12px 5px; font-size: 16px; background: #0a0a1a; color: #f9d423; border: 1px solid #f9d423; border-radius: 5px; }
        .btn-action { padding: 15px 30px; font-size: 20px; background: #f9d423; color: #050510; border: none; border-radius: 50px; font-weight: bold; margin-top: 15px; }
        
        #touchControls { 
            display: none; width: 100%; padding: 15px 0;
            justify-content: space-between; align-items: center;
            background: rgba(10, 10, 26, 0.5);
        }
        
        .touch-group { display: flex; gap: 25px; margin-left: 20px; }
        .touch-btn { 
            width: 75px; height: 75px; 
            background: rgba(0, 210, 255, 0.2); 
            border: 3px solid #00d2ff; border-radius: 50%; 
            color: white; font-size: 35px; 
            display: flex; align-items: center; justify-content: center;
        }
        .jump-btn { 
            width: 90px; height: 90px; 
            background: rgba(255, 63, 52, 0.3); 
            border-color: #ff3f34; margin-right: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 id="statusTitle" style="color: #f9d423; font-size: 28px; margin-bottom: 10px;">MATH BOMB JACK</h1>
        <p id="statusDesc" style="margin-bottom: 20px;">Selecciona tu desafío:</p>
        
        <div id="menuModes" class="menu-grid">
            <button class="btn-mode" onclick="setMode('SUMA')">➕ SUMAS</button>
            <button class="btn-mode" onclick="setMode('RESTA')">➖ RESTAS</button>
            <button class="btn-mode" onclick="showSubmenu('MULT')">✖️ TABLAS (X)</button>
            <button class="btn-mode" onclick="showSubmenu('DIV')">➗ DIVISIONES</button>
            <button class="btn-mode" style="grid-column: span 2;" onclick="setMode('MIX')">🔀 REPASO MIXTO (NIVELES)</button>
        </div>

        <div id="submenu" style="display:none; text-align: center;">
            <p id="submenuTitle">Elige la tabla:</p>
            <div class="submenu-grid" id="tableButtons"></div>
            <button class="btn-mode" style="margin-top:15px; width: 90%;" onclick="setMode(pendingMode, 'all')">TODAS LAS TABLAS</button>
            <button class="btn-mode" style="margin-top:10px; width: 90%; border-color: #ff3f34; color: #ff3f34;" onclick="backToMain()">VOLVER</button>
        </div>

        <button class="btn-action" id="mainBtn" style="display:none;" onclick="startGame()">EMPEZAR NIVEL</button>
    </div>

    <div class="hud">
        <a href="main-index.html" class="home-btn">🏠</a>
        <div>NIVEL: <span id="levelNum" class="level-tag">1</span></div>
        <div>BUSCA: <span id="equation" class="target">?</span></div>
        <div>Bombas: <span id="count">5</span> | Puntos: <span id="score">0</span></div>
    </div>
    
    <canvas id="gameCanvas" width="900" height="650"></canvas>

    <div id="touchControls">
        <div class="touch-group">
            <div class="touch-btn" id="btnLeft">←</div>
            <div class="touch-btn" id="btnRight">→</div>
        </div>
        <div class="touch-btn jump-btn" id="btnJump">↑</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let audioCtx;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSound(freq, type, duration, vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        let fps = 60, fpsInterval = 1000 / fps, then = Date.now();
        let score = 0, currentLevel = 1, gameActive = false, enemyBaseSpeed = 4;
        let gameMode = 'SUMA', selectedTable = 'all', pendingMode = '';
        let targetValue, player, enemy, platforms, bombs, keys = {};
        const gravity = 0.5, friction = 0.8;

        const themeColors = ["#00d2ff", "#ff3f34", "#f9d423", "#34e7e4", "#a030ff", "#4cd137"];

        function drawGameBackground() {
            const color = themeColors[(currentLevel - 1) % themeColors.length];
            ctx.fillStyle = "#050510";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = color;
            ctx.globalAlpha = 0.1;
            ctx.beginPath();
            for(let x=0; x<canvas.width; x+=50) { ctx.moveTo(x,0); ctx.lineTo(x, canvas.height); }
            for(let y=0; y<canvas.height; y+=50) { ctx.moveTo(0,y); ctx.lineTo(canvas.width, y); }
            ctx.stroke();
            
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 4;
            ctx.strokeRect(20, 20, canvas.width-40, canvas.height-40);
            ctx.globalAlpha = 1.0;
            ctx.lineWidth = 1;
        }

        function setMode(mode, table = 'all') {
            gameMode = mode; selectedTable = table; initAudio();
            document.getElementById("menuModes").style.display = "none";
            document.getElementById("submenu").style.display = "none";
            document.getElementById("mainBtn").style.display = "block";
            document.getElementById("statusDesc").innerText = `Modo: ${mode} ${table!=='all'?'(Tabla '+table+')':''}`;
        }

        function showSubmenu(mode) {
            pendingMode = mode;
            document.getElementById("menuModes").style.display = "none";
            document.getElementById("submenu").style.display = "block";
            const container = document.getElementById("tableButtons");
            container.innerHTML = '';
            for(let i=1; i<=10; i++) {
                let btn = document.createElement("button");
                btn.className = "btn-sub"; btn.innerText = i;
                btn.onclick = () => setMode(mode, i);
                container.appendChild(btn);
            }
        }

        function backToMain() {
            document.getElementById("menuModes").style.display = "grid";
            document.getElementById("submenu").style.display = "none";
        }

        function startGame() {
            document.getElementById("overlay").style.display = "none";
            if (currentLevel === 1) { score = 0; enemyBaseSpeed = 4; document.getElementById("score").innerText = "0"; }
            player = { x: 450, y: 600, w: 30, h: 35, velX: 0, velY: 0, speed: 5, jumpStrength: -12, grounded: false };
            enemy = { x: 100, y: 100, r: 18, vx: enemyBaseSpeed, vy: enemyBaseSpeed };
            document.getElementById("levelNum").innerText = currentLevel;
            createLevelMap();
            gameActive = true; then = Date.now();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            requestAnimationFrame(draw);
        }

        function createLevelMap() {
            bombs = [];
            platforms = [{ x: 0, y: 630, w: 900, h: 20 }];
            for (let i = 0; i < 5; i++) {
                let y = 100 + (i * 110);
                platforms.push({ x: 30, y: y, w: 120, h: 15 }, { x: 750, y: y, w: 120, h: 15 }, { x: 280, y: y + 55, w: 120, h: 15 }, { x: 500, y: y + 55, w: 120, h: 15 });
            }
            let numBombs = 5 + (currentLevel * 2); 
            while (bombs.length < numBombs) {
                let plat = platforms[Math.floor(Math.random() * (platforms.length - 1)) + 1];
                let bx = plat.x + 15 + Math.random() * (plat.w - 30);
                let by = plat.y - 25;
                let val;
                
                if (gameMode === 'MIX') {
                    val = Math.floor(Math.random() * (10 + currentLevel * 5)) + 1;
                } else if (gameMode === 'MULT' || gameMode === 'DIV') {
                    let base = (selectedTable === 'all') ? (Math.floor(Math.random() * 10) + 1) : selectedTable;
                    let factor = Math.floor(Math.random() * 10) + 1;
                    val = (gameMode === 'DIV') ? factor : base * factor;
                } else {
                    val = Math.floor(Math.random() * (15 + currentLevel * 3)) + 1;
                }

                if (!bombs.some(b => Math.sqrt(Math.pow(b.x-bx,2)+Math.pow(b.y-by,2)) < 40)) {
                    bombs.push({ x: bx, y: by, val: val, r: 16, active: true });
                }
            }
            nextQuestion();
        }

        function nextQuestion() {
            let activeBombs = bombs.filter(b => b.active);
            if (activeBombs.length === 0) { victoryTransition(); return; }
            let chosenBomb = activeBombs[Math.floor(Math.random() * activeBombs.length)];
            targetValue = chosenBomb.val;
            
            let modes = ['SUMA', 'RESTA', 'MULT', 'DIV'];
            let currentOp = gameMode === 'MIX' ? modes[Math.floor(Math.random() * 4)] : gameMode;
            let display = "";

            switch(currentOp) {
                case 'SUMA':
                    let s1 = Math.floor(Math.random() * targetValue);
                    display = `${s1} + ${targetValue - s1}`; break;
                case 'RESTA':
                    let r2 = Math.floor(Math.random() * 10) + 1;
                    display = `${targetValue + r2} - ${r2}`; break;
                case 'MULT':
                    let d = 1;
                    for(let i=10; i>=1; i--) { if(targetValue % i === 0) { d = i; break; } }
                    display = `${d} x ${targetValue / d}`; break;
                case 'DIV':
                    let div = Math.floor(Math.random() * 9) + 1;
                    display = `${targetValue * div} : ${div}`; break;
            }
            document.getElementById("equation").innerText = display;
            document.getElementById("count").innerText = activeBombs.length;
        }

        function victoryTransition() {
            gameActive = false; currentLevel++; enemyBaseSpeed += 0.5;
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("statusTitle").innerText = "¡NIVEL SUPERADO!";
            document.getElementById("mainBtn").style.display = "block";
            playSound(600, 'sine', 0.2);
        }

        function gameOver() {
            gameActive = false; currentLevel = 1;
            document.getElementById("overlay").style.display = "flex";
            document.getElementById("statusTitle").innerText = "¡VIRUS CAPTURADO!";
            document.getElementById("menuModes").style.display = "grid";
            document.getElementById("mainBtn").style.display = "none";
            playSound(50, 'sawtooth', 0.5, 0.2);
        }

        function drawPlayer(x, y, w, h) {
            ctx.fillStyle = "#ff3f34"; ctx.fillRect(x, y, w, h);
            ctx.fillStyle = "#34e7e4"; ctx.fillRect(x + 5, y + 4, w - 10, h / 2.5);
            ctx.fillStyle = "white"; ctx.fillRect(x + 7, y + 6, 4, 2);
            ctx.fillStyle = "#1e272e"; ctx.fillRect(x, y + h - 8, w, 3);
            ctx.fillStyle = "#000"; ctx.fillRect(x + 2, y + h - 2, 6, 3);
            ctx.fillRect(x + w - 8, y + h - 2, 6, 3);
            
            let swing = Math.abs(player.velX) > 0.1 ? Math.sin(Date.now() / 100) * 5 : 0;
            ctx.fillStyle = "#ff3f34";
            ctx.fillRect(x - 3, y + 10 + swing, 4, 10); ctx.fillRect(x + w, y + 10 - swing, 4, 10);
        }

        window.addEventListener("keydown", e => keys[e.code] = true);
        window.addEventListener("keyup", e => keys[e.code] = false);

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById("touchControls").style.display = "flex";
            const setupBtn = (id, key) => {
                const btn = document.getElementById(id);
                btn.addEventListener("touchstart", (e) => { e.preventDefault(); keys[key] = true; });
                btn.addEventListener("touchend", (e) => { e.preventDefault(); keys[key] = false; });
            };
            setupBtn("btnLeft", "ArrowLeft"); setupBtn("btnRight", "ArrowRight"); setupBtn("btnJump", "ArrowUp");
        }

        function update() {
            if (!gameActive) return;
            if (keys["ArrowRight"] && player.velX < player.speed) player.velX++;
            if (keys["ArrowLeft"] && player.velX > -player.speed) player.velX--;
            if (keys["ArrowUp"] && player.grounded) { player.velY = player.jumpStrength; player.grounded = false; playSound(200, 'triangle', 0.1); }
            
            player.velX *= friction; player.velY += gravity; player.grounded = false;
            platforms.forEach(plat => {
                if (player.x < plat.x + plat.w && player.x + player.w > plat.x && player.y + player.h > plat.y && player.y + player.h < plat.y + plat.h + player.velY) {
                    player.grounded = true; player.velY = 0; player.y = plat.y - player.h;
                }
            });
            player.x += player.velX; player.y += player.velY;
            if (player.x < 0) player.x = canvas.width; if (player.x > canvas.width) player.x = 0;
            
            enemy.x += enemy.vx; enemy.y += enemy.vy;
            if (enemy.x - enemy.r < 0 || enemy.x + enemy.r > canvas.width) enemy.vx *= -1;
            if (enemy.y - enemy.r < 0 || enemy.y + enemy.r > canvas.height) enemy.vy *= -1;
            
            if (Math.sqrt(Math.pow((player.x+player.w/2)-enemy.x,2)+Math.pow((player.y+player.h/2)-enemy.y,2)) < player.w/2+enemy.r) gameOver();
            
            bombs.forEach(bomb => {
                if (!bomb.active) return;
                if (Math.sqrt(Math.pow((player.x+player.w/2)-bomb.x,2)+Math.pow((player.y+player.h/2)-bomb.y,2)) < player.w/2+bomb.r) {
                    if (bomb.val === targetValue) {
                        bomb.active = false; score += (100 * currentLevel); playSound(600, 'sine', 0.1);
                        document.getElementById("score").innerText = score; nextQuestion();
                    } else {
                        playSound(100, 'square', 0.3, 0.2); 
                        enemyBaseSpeed *= 1.3; 
                        enemy.vx = (enemy.vx > 0 ? 1 : -1) * enemyBaseSpeed;
                        enemy.vy = (enemy.vy > 0 ? 1 : -1) * enemyBaseSpeed;
                        player.x = 450; player.y = 600;
                    }
                }
            });
        }

        function draw() {
            if (!gameActive) return;
            let now = Date.now(), elapsed = now - then;
            if (elapsed > fpsInterval) {
                then = now - (elapsed % fpsInterval);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawGameBackground();

                platforms.forEach(p => { 
                    ctx.fillStyle = "#1e272e"; ctx.fillRect(p.x, p.y, p.w, p.h); 
                    ctx.strokeStyle = themeColors[(currentLevel - 1) % themeColors.length]; ctx.strokeRect(p.x, p.y, p.w, p.h); 
                });

                ctx.beginPath(); ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI*2);
                ctx.fillStyle = "#a030ff"; ctx.shadowBlur = 15; ctx.shadowColor = "#a030ff"; ctx.fill(); 
                ctx.closePath(); ctx.shadowBlur = 0;

                drawPlayer(player.x, player.y, player.w, player.h);

                bombs.forEach(b => {
                    if (b.active) {
                        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                        ctx.fillStyle = "#f9d423"; ctx.shadowBlur = 10; ctx.shadowColor = "#f9d423"; ctx.fill(); ctx.shadowBlur = 0;
                        ctx.fillStyle = "#000"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText(b.val, b.x, b.y + 5);
                    }
                });
                update(); 
            }
            requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
