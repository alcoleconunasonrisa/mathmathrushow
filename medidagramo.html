<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conversor Masa - Toneladas a Miligramos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f2994a, #f2c94c);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            width: 98%; max-width: 1000px; height: 95vh;
            background: white; border-radius: 24px; padding: 20px;
            display: flex; flex-direction: column; position: relative;
        }
        .btn-home {
            position: absolute; top: 15px; right: 15px; background: #f44336; color: white;
            width: 45px; height: 45px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; text-decoration: none; font-size: 1.5rem; border:none; cursor:pointer;
        }
        .instruccion {
            background: #795548; color: white; padding: 15px; border-radius: 12px;
            text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;
            min-height: 60px; display: flex; align-items: center; justify-content: center;
        }
        .reto {
            font-size: 1.8rem; text-align: center; margin-bottom: 20px;
            color: #5d4037; font-weight: bold; background: #efebe9; padding: 10px; border-radius: 10px;
        }
        /* Ajuste a 10 columnas para quepo todo */
        .tabla-unidades {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 100%; margin-bottom: 20px;
        }
        .cabecera {
            background: #795548; color: white; text-align: center; padding: 10px 0;
            font-weight: bold; border-radius: 8px 8px 0 0; font-size: 0.7rem;
        }
        .celda {
            height: 65px; border: 2px solid #ddd; background: #f9f9f9;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; border-radius: 0 0 8px 8px;
        }
        .celda.espacio-vacio { background: #eee; border-style: dashed; color: #ccc; }
        .celda.activa { border: 4px solid #f2994a; background: #fff3e0; }
        .celda.correcta { background: #ffe0b2; border-color: #f2994a; color: #5d4037; }

        .zona-inferior { display: flex; flex: 1; gap: 20px; overflow: hidden; }
        .teclado-container { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 250px; }
        .tecla {
            padding: 15px; font-size: 1.5rem; border: none; border-radius: 12px;
            background: #eee; font-weight: bold; cursor: pointer; box-shadow: 0 4px #ccc;
        }
        .tecla:active { transform: translateY(2px); box-shadow: 0 2px #ccc; }

        .resultado-final {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-left: 2px solid #eee;
        }
        .caja-resultado {
            width: 220px; height: 65px; border: 3px solid #ccc; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold;
            margin: 10px 0; background: #fff; color: #333;
        }
        .caja-resultado.activa { border-color: #f2994a; background: #fff3e0; }
        .caja-resultado.error { background: #ffcdd2; border-color: #f44336; animation: shake 0.3s; }

        .btn-verificar {
            width: 220px; padding: 15px; background: #795548; color: white; border: none;
            border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px #3e2723; margin-top: 10px; display: none;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #modal-victoria {
            display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.95);
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            border-radius: 24px;
        }
        .btn-modal {
            width: 250px; padding: 15px; margin: 10px; border: none; border-radius: 12px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="main-index.html" class="btn-home">🏠</a>
    
    <div id="menu" style="text-align: center; margin-top: 50px;">
        <h1 style="margin-bottom: 30px; color: #5d4037;">Unidades de Masa (Peso)</h1>
        <button class="tecla" style="width: 280px; margin: 10px; background: #ffe0b2;" onclick="iniciar(1)">Nivel 1: Bajar (×10)</button><br>
        <button class="tecla" style="width: 280px; margin: 10px; background: #fff9c4;" onclick="iniciar(2)">Nivel 2: Subir (÷10)</button><br>
        <button class="tecla" style="width: 280px; margin: 10px; background: #ffccbc;" onclick="iniciar(3)">Nivel 3: Mixto / Toneladas</button>
    </div>

    <div id="juego" style="display: none; flex-direction: column; height: 100%;">
        <div id="instruccion" class="instruccion"></div>
        <div id="reto" class="reto"></div>

        <div class="tabla-unidades">
            <div><div class="cabecera">t</div><div id="u0" class="celda"></div></div>
            <div><div class="cabecera">q</div><div id="u1" class="celda"></div></div>
            <div><div class="cabecera">-</div><div id="u2" class="celda espacio-vacio"></div></div>
            <div><div class="cabecera">kg</div><div id="u3" class="celda"></div></div>
            <div><div class="cabecera">hg</div><div id="u4" class="celda"></div></div>
            <div><div class="cabecera">dag</div><div id="u5" class="celda"></div></div>
            <div><div class="cabecera">g</div><div id="u6" class="celda"></div></div>
            <div><div class="cabecera">dg</div><div id="u7" class="celda"></div></div>
            <div><div class="cabecera">cg</div><div id="u8" class="celda"></div></div>
            <div><div class="cabecera">mg</div><div id="u9" class="celda"></div></div>
        </div>

        <div class="zona-inferior">
            <div class="teclado-container">
                <div class="teclado">
                    <button class="tecla" onclick="presionar('1')">1</button>
                    <button class="tecla" onclick="presionar('2')">2</button>
                    <button class="tecla" onclick="presionar('3')">3</button>
                    <button class="tecla" onclick="presionar('4')">4</button>
                    <button class="tecla" onclick="presionar('5')">5</button>
                    <button class="tecla" onclick="presionar('6')">6</button>
                    <button class="tecla" onclick="presionar('7')">7</button>
                    <button class="tecla" onclick="presionar('8')">8</button>
                    <button class="tecla" onclick="presionar('9')">9</button>
                    <button class="tecla" style="background:#bbdefb" onclick="presionar(',')">,</button>
                    <button class="tecla" onclick="presionar('0')">0</button>
                    <button class="tecla" style="background:#ffcdd2" onclick="borrar()">C</button>
                </div>
            </div>
            <div class="resultado-final">
                <p>Tu respuesta:</p>
                <div id="res-box" class="caja-resultado"></div>
                <p id="label-destino" style="font-weight: bold; color: #5d4037; font-size: 1.2rem;"></p>
                <button id="btn-verificar" class="btn-verificar" onclick="verificarResultado()">VERIFICAR ✅</button>
            </div>
        </div>
    </div>

    <div id="modal-victoria">
        <h2 style="font-size: 2.5rem; color: #f2994a;">¡Conseguido! ⚖️</h2>
        <p id="res-final-txt" style="font-size: 1.4rem; margin: 20px; text-align: center;"></p>
        <button class="btn-modal" style="background: #f2994a;" onclick="siguienteRetoMismoNivel()">Siguiente Reto</button>
        <button class="btn-modal" style="background: #795548;" onclick="volverAMenu()">Cambiar Nivel</button>
    </div>
</div>

<script>
    // t=0, q=1, -=2, kg=3, hg=4, dag=5, g=6, dg=7, cg=8, mg=9
    const unidades = ["t", "q", "-", "kg", "hg", "dag", "g", "dg", "cg", "mg"];
    let uOrig, uDest, valOrig, valCorrectoReal, nivelActual;
    let pasos = []; 
    let indexPaso = 0;
    let modoResultado = false;
    let inputRes = "";
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function iniciar(nivel) {
        nivelActual = nivel;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('modal-victoria').style.display = 'none';
        document.getElementById('juego').style.display = 'flex';

        // Evitar que el origen o destino sea la casilla vacía (índice 2)
        do {
            uOrig = Math.floor(Math.random() * 10);
        } while (uOrig === 2);

        if(nivel === 1) { 
            uOrig = Math.floor(Math.random()*5); if(uOrig==2) uOrig=1;
            uDest = uOrig + Math.floor(Math.random()*3)+1; 
            if(uDest > 9) uDest = 9;
        }
        else if(nivel === 2) { 
            uOrig = Math.floor(Math.random()*5)+5; 
            uDest = uOrig - (Math.floor(Math.random()*3)+1);
            if(uDest < 0) uDest = 0;
        }
        else { 
            do { uDest = Math.floor(Math.random()*10); } while(uOrig === uDest || uDest === 2); 
        }
        if(uDest === 2) uDest = 3; // Corregir si cae en el hueco

        let numBase = (nivel === 3) ? (Math.random() * 8 + 1).toFixed(1) : (Math.floor(Math.random() * 9) + 1).toString();
        valOrig = numBase.toString().replace('.', ',');

        let distancia = uDest - uOrig;
        valCorrectoReal = parseFloat(numBase) * Math.pow(10, distancia);

        document.getElementById('reto').innerHTML = `${valOrig} ${unidades[uOrig]} ➔ ? ${unidades[uDest]}`;
        document.getElementById('label-destino').textContent = unidades[uDest];

        prepararPasos();
    }

    function prepararPasos() {
        pasos = []; indexPaso = 0; modoResultado = false; inputRes = "";
        let partes = valOrig.split(',');
        let parteEntera = partes[0];
        let parteDecimal = partes[1] || "";

        pasos.push({ idx: uOrig, val: parteEntera, msg: `Escribe la parte entera (${parteEntera}) en ${unidades[uOrig]}` });

        if (parteDecimal.length > 0) {
            for (let i = 0; i < parteDecimal.length; i++) {
                let targetIdx = uOrig + (i + 1);
                if (targetIdx < 10) {
                    let txt = (targetIdx === 2) ? "el hueco vacío" : unidades[targetIdx];
                    pasos.push({ idx: targetIdx, val: parteDecimal[i], msg: `Escribe el decimal (${parteDecimal[i]}) en ${txt}` });
                }
            }
        }

        if (uOrig < uDest) {
            let ultimaOcupada = uOrig + parteDecimal.length;
            for (let i = ultimaOcupada + 1; i <= uDest; i++) {
                let txt = (i === 2) ? "el hueco vacío" : unidades[i];
                pasos.push({ idx: i, val: '0', msg: `Completa con un 0 en ${txt}` });
            }
        } else {
            for (let i = uOrig - 1; i >= uDest; i--) {
                let txt = (i === 2) ? "el hueco vacío" : unidades[i];
                pasos.push({ idx: i, val: '0', msg: `Sube colocando un 0 en ${txt}` });
            }
        }
        actualizarUI();
    }

    function actualizarUI() {
        document.querySelectorAll('.celda').forEach(c => {
            c.classList.remove('activa', 'correcta');
            if(!c.classList.contains('espacio-vacio')) c.textContent = ""; 
        });
        document.getElementById('res-box').classList.remove('activa', 'error');
        document.getElementById('res-box').textContent = "";
        document.getElementById('btn-verificar').style.display = 'none';
        
        for(let i=0; i < indexPaso; i++) {
            let p = pasos[i];
            document.getElementById('u' + p.idx).textContent = p.val;
            document.getElementById('u' + p.idx).classList.add('correcta');
        }

        if(indexPaso < pasos.length) {
            document.getElementById('instruccion').textContent = pasos[indexPaso].msg;
            document.getElementById('u' + pasos[indexPaso].idx).classList.add('activa');
        } else {
            modoResultado = true;
            document.getElementById('instruccion').textContent = "¡Hecho! Escribe el resultado final.";
            document.getElementById('res-box').classList.add('activa');
            document.getElementById('btn-verificar').style.display = 'block';
        }
    }

    function presionar(char) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if(!modoResultado) {
            if(char === pasos[indexPaso].val) {
                playSound(800); indexPaso++; actualizarUI();
            } else { errorAnim(document.getElementById('u' + pasos[indexPaso].idx)); }
        } else {
            document.getElementById('res-box').classList.remove('error');
            if (char === ',') { 
                if (inputRes.includes(',')) return; 
                inputRes += (inputRes === "" ? "0," : ",");
            } else { inputRes += char; }
            document.getElementById('res-box').textContent = inputRes;
        }
    }

    function verificarResultado() {
        let numUser = parseFloat(inputRes.replace(',', '.'));
        let precision = 0.0000001;
        if (!isNaN(numUser) && Math.abs(numUser - valCorrectoReal) < precision) {
            playSound(1000);
            finalizar();
        } else {
            playSound(200);
            document.getElementById('res-box').classList.add('error');
            setTimeout(() => {
                inputRes = "";
                document.getElementById('res-box').textContent = "";
                document.getElementById('res-box').classList.remove('error');
            }, 800);
        }
    }

    function borrar() {
        if(modoResultado) {
            inputRes = "";
            document.getElementById('res-box').textContent = "";
        }
    }

    function errorAnim(el) {
        playSound(200);
        el.style.backgroundColor = "#ffcdd2";
        setTimeout(() => { el.style.backgroundColor = ""; }, 300);
    }

    function finalizar() {
        let finalStr = Number(valCorrectoReal.toFixed(10)).toString().replace('.', ',');
        let unidadTexto = unidades[uDest] === '-' ? 'unidades de 10kg' : unidades[uDest];
        document.getElementById('res-final-txt').innerHTML = `<b>${valOrig} ${unidades[uOrig]}</b> son:<br><span style="color:#795548; font-size:2.2rem">${finalStr} ${unidadTexto}</span>`;
        document.getElementById('modal-victoria').style.display = 'flex';
    }

    function siguienteRetoMismoNivel() { iniciar(nivelActual); }
    function volverAMenu() {
        document.getElementById('modal-victoria').style.display = 'none';
        document.getElementById('juego').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
    }

    function playSound(f) {
        try {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }
</script>
</body>
</html>
