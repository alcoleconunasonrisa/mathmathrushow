
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplicación Decimal - Paso a Paso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .container {
            width: 98%; max-width: 950px; height: 95vh;
            background: white; border-radius: 24px; padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; position: relative;
        }
        .btn-home {
            position: absolute; top: 15px; right: 15px;
            background: #f44336; color: white; border: none;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; z-index: 100;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
        }
        .instruccion {
            background: #1e3c72; color: white; padding: 12px;
            border-radius: 12px; text-align: center; margin-bottom: 10px;
            font-weight: bold; font-size: 1.1rem; margin-right: 55px;
        }
        .operacion-horizontal {
            font-size: 1.6rem; font-weight: bold; color: #1e3c72;
            text-align: center; margin-bottom: 10px; background: #e3f2fd;
            padding: 8px; border-radius: 10px; border: 2px dashed #1e3c72;
        }
        .contenido-juego { display: flex; flex: 1; gap: 15px; overflow: hidden; }
        .zona-operacion {
            flex: 1.8; overflow-y: auto; padding: 10px;
            border: 2px solid #f0f0f0; border-radius: 15px; background: #fafafa;
            display: flex; flex-direction: column; align-items: center;
        }
        .zona-teclado {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: #fff; padding: 5px; border-left: 2px solid #eee;
        }
        .tablero { font-family: 'Courier New', monospace; display: inline-block; }
        .fila { display: flex; justify-content: flex-end; align-items: center; min-height: 42px; }
        .fila-linea { border-bottom: 3px solid #333; margin: 5px 0; width: 100%; }
        .num, .celda, .signo, .celda-coma { width: 38px; height: 38px; line-height: 38px; text-align: center; font-size: 1.6rem; font-weight: bold; }
        .celda { border: 2px solid #ccc; border-radius: 6px; background: #fff; margin: 1px; }
        .celda-coma { border: 2px dashed #bbb; border-radius: 6px; background: #fff; margin: 1px; width: 20px; color: #e53935; }
        .celda.activa, .celda-coma.activa { border: 3px solid #1e3c72; background: #e3f2fd; }
        .celda.correcta, .celda-coma.correcta { border: 2px solid #4CAF50; background: #E8F5E9; color: #2E7D32; }
        .celda.incorrecta { border: 2px solid #f44336; background: #FFEBEE; animation: shake 0.3s; }
        .coma-fija { color: #e53935; font-size: 1.8rem; width: 15px; text-align: center; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-3px);} 75% {transform: translateX(3px);} }
        .teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 240px; }
        .tecla { padding: 12px 0; font-size: 1.3rem; border: none; border-radius: 10px; background: #f0f0f0; font-weight: bold; box-shadow: 0 4px #ccc; cursor: pointer; }
        .tecla:active { box-shadow: 0 2px #ccc; transform: translateY(2px); }
        .pantalla { display: none; height: 100%; width: 100%; }
        .pantalla.active { display: flex; flex-direction: column; }
        .btn-nivel { width: 100%; max-width: 300px; padding: 10px; margin: 5px auto; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }

        #modal-victoria {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 200; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 24px; text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="main-index.html" class="btn-home">🏠</a>
        <div id="menu" class="pantalla active">
            <h1 style="text-align:center; color:#1e3c72; margin: 30px 0;">Multiplica Decimales</h1>
            <button class="btn-nivel" style="background:#43a047" onclick="iniciar(1)">Nivel 1: Fácil</button>
            <button class="btn-nivel" style="background:#fb8c00" onclick="iniciar(2)">Nivel 2: Medio</button>
            <button class="btn-nivel" style="background:#e53935" onclick="iniciar(3)">Nivel 3: Experto</button>
        </div>
        <div id="juego" class="pantalla">
            <div id="instruccion" class="instruccion">Cargando...</div>
            <div id="horizontal" class="operacion-horizontal"></div>
            <div class="contenido-juego">
                <div class="zona-operacion"><div class="tablero" id="area-multi"></div></div>
                <div class="zona-teclado">
                    <div class="teclado">
                        <button class="tecla" onclick="entrada(1)">1</button>
                        <button class="tecla" onclick="entrada(2)">2</button>
                        <button class="tecla" onclick="entrada(3)">3</button>
                        <button class="tecla" onclick="entrada(4)">4</button>
                        <button class="tecla" onclick="entrada(5)">5</button>
                        <button class="tecla" onclick="entrada(6)">6</button>
                        <button class="tecla" onclick="entrada(7)">7</button>
                        <button class="tecla" onclick="entrada(8)">8</button>
                        <button class="tecla" onclick="entrada(9)">9</button>
                        <button class="tecla" style="background:#bbdefb" onclick="entrada(',')">,</button>
                        <button class="tecla" onclick="entrada(0)">0</button>
                        <button class="tecla" style="background:#ffcdd2" onclick="borrar()">C</button>
                    </div>
                    <button class="btn-nivel" style="background:#555; margin-top: 15px;" onclick="location.reload()">⬅ Volver</button>
                </div>
            </div>
        </div>
        <div id="modal-victoria">
            <h2 style="font-size: 2rem; color: #4CAF50;">¡Multiplicación lograda! 🏆</h2>
            <div id="mensaje-final" style="margin: 20px; font-size: 1.5rem; color: #333;"></div>
            <button class="btn-nivel" style="background:#43a047" onclick="location.reload()">Siguiente reto</button>
        </div>
    </div>

    <script>
        let s1, s2, resFinal;
        let pasosTotales = [], indexGlobal = 0;
        let audioCtx = null;

        function iniciar(n) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let d1 = (n === 3) ? 2 : 1;
            let d2 = (n === 1) ? 0 : 1;
            let v1 = (Math.random() * 20 + 10).toFixed(d1);
            let v2 = (Math.random() * 5 + 2).toFixed(d2);
            
            s1 = v1.replace('.', ',');
            s2 = v2.replace('.', ',');
            resFinal = (parseFloat(v1) * parseFloat(v2)).toFixed(d1 + d2).replace('.', ',');

            document.getElementById('horizontal').textContent = `${s1} × ${s2}`;
            document.getElementById('menu').classList.remove('active');
            document.getElementById('juego').classList.add('active');
            generarEstructura();
        }

        function generarEstructura() {
            const area = document.getElementById('area-multi');
            area.innerHTML = "";
            pasosTotales = [];
            indexGlobal = 0;
            
            // 1. FACTORES (Colocación inicial - Arriba a abajo)
            let f1 = crearFilaSimple(s1, false, "Coloca el primer factor arriba");
            let f2 = crearFilaSimple(s2, true, "Coloca el segundo factor debajo");
            pasosTotales.push(...f1.celdas, ...f2.celdas);
            
            area.appendChild(document.createElement('div')).className = "fila-linea";

            // 2. MULTIPLICACIONES PARCIALES (Derecha a izquierda)
            let f2Limpio = s2.replace(',', '');
            let f1Limpio = s1.replace(',', '');
            let cifrasF2 = f2Limpio.split('').reverse();
            
            cifrasF2.forEach((cifra, i) => {
                let valMul = (parseInt(f1Limpio) * parseInt(cifra)).toString();
                let fParcial = crearFilaParcial(valMul, i, `Multiplica ${cifra} por ${f1Limpio}`);
                pasosTotales.push(...fParcial.celdas.reverse()); 
            });

            // 3. SUMA FINAL CON COMA MANUAL (Derecha a izquierda)
            if (cifrasF2.length > 1) {
                area.appendChild(document.createElement('div')).className = "fila-linea";
                let fSuma = crearFilaSumaInteractiva(resFinal, "Suma y coloca la COMA en su sitio");
                pasosTotales.push(...fSuma.celdas.reverse());
            }

            actualizarCursor();
        }

        function crearFilaSimple(str, conSigno, info) {
            const area = document.getElementById('area-multi');
            let divFila = document.createElement('div');
            divFila.className = "fila";
            let celdas = [];
            if(conSigno) {
                let s = document.createElement('div'); s.className = "signo"; s.textContent = "×";
                divFila.appendChild(s);
            }
            for(let char of str) {
                if(char === ',') {
                    let c = document.createElement('div'); c.className = "coma-fija"; c.textContent = ",";
                    divFila.appendChild(c);
                } else {
                    let c = document.createElement('div'); c.className = "celda";
                    divFila.appendChild(c);
                    celdas.push({el: c, val: char, info: info});
                }
            }
            area.appendChild(divFila);
            return {celdas};
        }

        function crearFilaParcial(val, desplaza, info) {
            const area = document.getElementById('area-multi');
            let divFila = document.createElement('div');
            divFila.className = "fila";
            let celdas = [];
            for(let char of val) {
                let c = document.createElement('div'); c.className = "celda";
                c.style.visibility = "hidden";
                divFila.appendChild(c);
                celdas.push({el: c, val: char, info: info});
            }
            for(let i=0; i<desplaza; i++) {
                let x = document.createElement('div'); x.className = "num"; 
                x.textContent = "0"; x.style.color = "#ccc"; x.style.fontSize = "1rem";
                divFila.appendChild(x);
            }
            area.appendChild(divFila);
            return {celdas};
        }

        function crearFilaSumaInteractiva(str, info) {
            const area = document.getElementById('area-multi');
            let divFila = document.createElement('div');
            divFila.className = "fila";
            let celdas = [];
            for(let char of str) {
                let c = document.createElement('div');
                c.className = (char === ',') ? "celda-coma" : "celda";
                c.style.visibility = "hidden";
                divFila.appendChild(c);
                celdas.push({el: c, val: char, info: info});
            }
            area.appendChild(divFila);
            return {celdas};
        }

        function actualizarCursor() {
            pasosTotales.forEach(p => p.el.classList.remove('activa'));
            if(indexGlobal < pasosTotales.length) {
                let p = pasosTotales[indexGlobal];
                p.el.classList.add('activa');
                p.el.style.visibility = "visible";
                document.getElementById('instruccion').textContent = p.info;
            }
        }

        function entrada(v) {
            if(indexGlobal >= pasosTotales.length) return;
            let target = pasosTotales[indexGlobal];
            let ingreso = v.toString().replace('.', ',');

            if(ingreso === target.val) {
                playSound(800);
                target.el.textContent = ingreso;
                target.el.className = (target.val === ',') ? "celda-coma correcta" : "celda correcta";
                indexGlobal++;
                if(indexGlobal === pasosTotales.length) {
                    setTimeout(() => {
                        document.getElementById('mensaje-final').textContent = `¡Resultado correcto: ${resFinal}!`;
                        document.getElementById('modal-victoria').style.display = "flex";
                    }, 300);
                }
                actualizarCursor();
            } else {
                playSound(200);
                target.el.classList.add('incorrecta');
                setTimeout(() => target.el.classList.remove('incorrecta'), 400);
            }
        }

        function borrar() {
            if(indexGlobal > 0) {
                indexGlobal--;
                pasosTotales[indexGlobal].el.textContent = "";
                let baseClase = (pasosTotales[indexGlobal].val === ',') ? "celda-coma" : "celda";
                pasosTotales[indexGlobal].el.className = baseClase + " activa";
                actualizarCursor();
            }
        }

        function playSound(f) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f;
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</body>
</html>
