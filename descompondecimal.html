<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Descomposición Decimal - Corrección Intuitiva</title>
    <style>
        :root {
            --primary: #4338ca;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --bg-ui: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #1e1b4b, #4338ca);
            height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .container {
            width: 98%; max-width: 1100px; height: 95vh;
            background: white; border-radius: 2rem; padding: 20px;
            display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .btn-home { padding: 10px 20px; background: #f1f5f9; border-radius: 12px; text-decoration: none; color: #1e1b4b; font-weight: bold; border: 1px solid #e2e8f0; }

        .screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        .game-layout { display: flex; flex: 1; width: 100%; gap: 30px; align-items: center; overflow: hidden; }
        .main-area { flex: 1.8; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .numpad-area { flex: 1; max-width: 340px; display: flex; flex-direction: column; gap: 15px; }

        .num-display {
            font-size: 4rem; font-weight: 900; color: var(--primary);
            background: var(--bg-ui); padding: 20px 50px; border-radius: 25px;
            border: 5px solid #e2e8f0; margin-bottom: 25px; letter-spacing: 4px;
        }

        .grid-descomponer { display: grid; gap: 15px; width: 100%; }
        .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .label { width: 100%; text-align: center; color: white; font-weight: bold; padding: 8px; border-radius: 10px; font-size: 1.1rem; }
        .c-c { background: #ef4444; } .c-d { background: #f59e0b; } .c-u { background: #ecc94b; color: #000; }
        .c-dc { background: #10b981; } .c-cn { background: #3b82f6; } .c-ml { background: #8b5cf6; }

        .slot, .valor-input {
            width: 100%; border-radius: 15px; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; transition: all 0.3s;
            background: white; border: 3px solid #cbd5e1;
        }

        .slot { height: 75px; font-size: 2.5rem; }
        .valor-input { height: 55px; font-size: 1.2rem; }

        .active-input { border-color: var(--secondary) !important; background: #f5f3ff !important; transform: scale(1.03); box-shadow: 0 0 15px rgba(124, 58, 237, 0.2); }
        .is-correct { background: #d1fae5 !important; border-color: var(--success) !important; color: #065f46; }
        .is-wrong { background: #fee2e2 !important; border-color: var(--danger) !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .tag-valor { font-size: 0.65rem; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-right: 5px;}

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
        .key {
            background: white; border: 1px solid #e2e8f0; padding: 1.2rem 0; font-size: 2rem;
            font-weight: bold; border-radius: 18px; cursor: pointer;
            box-shadow: 0 6px 0 #cbd5e1; color: var(--primary); transition: 0.1s;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #cbd5e1; }

        .instr-box { background: #eef2ff; color: var(--primary); padding: 15px 30px; border-radius: 20px; margin-bottom: 20px; font-weight: 800; text-align: center; font-size: 1.3rem; }
        .btn-level { width: 100%; max-width: 400px; padding: 25px; margin: 12px; border: none; border-radius: 20px; color: white; font-size: 1.5rem; font-weight: bold; cursor: pointer; }

        @media (max-width: 900px) {
            .game-layout { flex-direction: column; overflow-y: auto; }
            .num-display { font-size: 2.2rem; }
            .tag-valor { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="main-index.html" class="btn-home">🏠 INICIO</a>
        <div id="level-display" style="font-weight: bold; color: var(--secondary); font-size: 1.2rem;"></div>
    </div>

    <div id="menu" class="screen active">
        <h1 style="color: var(--primary); font-size: 3rem; margin-bottom: 40px;">Descomposición</h1>
        <button class="btn-level" style="background: var(--success)" onclick="startGame(1)">Nivel 1: U , d c m</button>
        <button class="btn-level" style="background: var(--danger)" onclick="startGame(2)">Nivel 2: C D U , d c m</button>
    </div>

    <div id="game" class="screen">
        <div class="instr-box" id="instruccion">PASO 1: COLOCA LAS CIFRAS</div>
        <div class="game-layout">
            <div class="main-area">
                <div id="target-num" class="num-display">0,000</div>
                <div class="grid-descomponer" id="grid"></div>
            </div>
            <div class="numpad-area">
                <div class="numpad">
                    <button class="key" onclick="pressKey('7')">7</button>
                    <button class="key" onclick="pressKey('8')">8</button>
                    <button class="key" onclick="pressKey('9')">9</button>
                    <button class="key" onclick="pressKey('4')">4</button>
                    <button class="key" onclick="pressKey('5')">5</button>
                    <button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('1')">1</button>
                    <button class="key" onclick="pressKey('2')">2</button>
                    <button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" style="color:var(--secondary)" onclick="pressKey(',')">,</button>
                    <button class="key" onclick="pressKey('0')">0</button>
                    <button class="key" style="background:#eee; font-size:1.2rem;" onclick="deleteContent()">⌫</button>
                </div>
                <button onclick="location.reload()" style="margin-top:10px; border:none; background:none; color:#94a3b8; cursor:pointer; font-weight:bold;">⬅ Cambiar Nivel</button>
            </div>
        </div>
    </div>
</div>

<script>
    let nivel = 1, paso = 1, columnasActivas = [], indiceActual = 0, targetData = {}, bloqueado = false;
    const config = { 'c': { label: 'C', class: 'c-c' }, 'd': { label: 'D', class: 'c-d' }, 'u': { label: 'U', class: 'c-u' }, 'dc': { label: 'd', class: 'c-dc' }, 'cn': { label: 'c', class: 'c-cn' }, 'ml': { label: 'm', class: 'c-ml' } };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type = 'sine', duration = 0.2) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function startGame(n) {
        nivel = n;
        columnasActivas = (n === 1) ? ['u', 'dc', 'cn', 'ml'] : ['c', 'd', 'u', 'dc', 'cn', 'ml'];
        document.getElementById('menu').classList.remove('active');
        document.getElementById('game').classList.add('active');
        buildGrid();
        nextExercise();
    }

    function buildGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${columnasActivas.length}, 1fr)`;
        grid.innerHTML = '';
        columnasActivas.forEach(id => {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `<div class="label ${config[id].class}">${config[id].label}</div>
                             <div class="slot" id="slot-${id}"></div>
                             <div style="display:flex; align-items:center; width:100%;">
                                <span class="tag-valor">VALOR</span>
                                <div class="valor-input" id="val-${id}"></div>
                             </div>`;
            grid.appendChild(col);
        });
    }

    function nextExercise() {
        paso = 1; indiceActual = 0; bloqueado = false;
        document.getElementById('instruccion').innerText = "PASO 1: COLOCA LAS CIFRAS";
        let n = (nivel === 1) ? (Math.random() * 9).toFixed(3) : (Math.random() * 900 + 10).toFixed(3);
        if(Math.random() > 0.4) {
            let p = n.split('.'); let d = p[1].split(''); d[Math.floor(Math.random()*3)] = '0'; n = p[0] + '.' + d.join('');
        }
        document.getElementById('target-num').innerText = n.replace('.', ',');
        let [entera, decimal] = n.split('.');
        entera = entera.padStart(3, '0'); decimal = decimal.padEnd(3, '0');
        targetData = {
            c: { cifra: entera[0], valor: (entera[0]*100).toString() },
            d: { cifra: entera[1], valor: (entera[1]*10).toString() },
            u: { cifra: entera[2], valor: entera[2] },
            dc: { cifra: decimal[0], valor: "0," + decimal[0] },
            cn: { cifra: decimal[1], valor: "0,0" + decimal[1] },
            ml: { cifra: decimal[2], valor: "0,00" + decimal[2] }
        };
        columnasActivas.forEach(id => {
            const s = document.getElementById('slot-'+id), v = document.getElementById('val-'+id);
            s.innerText = ""; s.className = "slot";
            v.innerText = ""; v.className = "valor-input";
        });
        updateFocusUI();
    }

    function updateFocusUI() {
        document.querySelectorAll('.slot, .valor-input').forEach(el => el.classList.remove('active-input'));
        const id = columnasActivas[indiceActual];
        const el = (paso === 1) ? document.getElementById('slot-' + id) : document.getElementById('val-' + id);
        if(el) el.classList.add('active-input');
    }

    function pressKey(k) {
        if(bloqueado) return;
        playSfx(440, 'sine', 0.05);
        const id = columnasActivas[indiceActual];
        const el = (paso === 1) ? document.getElementById('slot-' + id) : document.getElementById('val-' + id);
        
        if(paso === 1) {
            if(k === ',') return;
            el.innerText = k;
            validarCasilla(el, k, targetData[id].cifra);
        } else {
            el.innerText += k;
            let uV = el.innerText.replace(',', '.'), tV = targetData[id].valor.replace(',', '.');
            // Si el largo es suficiente o es un 0 simple
            if((uV === "0" && parseFloat(tV) === 0) || uV.length >= tV.length) {
                validarCasilla(el, el.innerText, targetData[id].valor);
            }
        }
    }

    function validarCasilla(el, userVal, targetVal) {
        bloqueado = true;
        let isOk = false;
        
        if(paso === 1) isOk = (userVal == targetVal);
        else isOk = ( (parseFloat(userVal.replace(',','.')) === 0 && parseFloat(targetVal.replace(',','.')) === 0) || userVal === targetVal );

        if(isOk) {
            playSfx(600, 'sine', 0.1);
            el.classList.remove('active-input');
            el.classList.add('is-correct');
            setTimeout(() => {
                bloqueado = false;
                if(indiceActual < columnasActivas.length - 1) {
                    indiceActual++;
                    updateFocusUI();
                } else {
                    finalizarPaso();
                }
            }, 200);
        } else {
            playSfx(150, 'sawtooth', 0.3);
            el.classList.add('is-wrong');
            setTimeout(() => {
                el.classList.remove('is-wrong');
                el.innerText = "";
                bloqueado = false;
            }, 800);
        }
    }

    function finalizarPaso() {
        if(paso === 1) {
            paso = 2; indiceActual = 0;
            document.getElementById('instruccion').innerText = "PASO 2: ESCRIBE EL VALOR DE CADA CIFRA";
            updateFocusUI();
        } else {
            playSfx(1000, 'sine', 0.5);
            setTimeout(nextExercise, 1000);
        }
    }

    function deleteContent() {
        if(bloqueado) return;
        const id = columnasActivas[indiceActual];
        const el = (paso === 1) ? document.getElementById('slot-' + id) : document.getElementById('val-' + id);
        el.innerText = "";
    }
</script>
</body>
</html>
