<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Descomposición Natural - Pro</title>
    <style>
        :root {
            --primary: #1e40af;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --bg-ui: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(135deg, #0f172a, #1e40af);
            height: 100vh; height: -webkit-fill-available;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .container {
            width: 98%; max-width: 1200px; height: 98vh;
            background: white; border-radius: 1.5rem; padding: 15px;
            display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; border-bottom: 2px solid #f1f5f9; padding-bottom: 5px; }
        .btn-home { padding: 8px 15px; background: #f1f5f9; border-radius: 10px; text-decoration: none; color: #1e1b4b; font-weight: bold; font-size: 0.9rem; border: 1px solid #ddd; }

        .screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .active { display: flex; }

        .game-layout { 
            display: flex; flex: 1; width: 100%; gap: 15px; 
            align-items: center; justify-content: space-between; overflow: hidden; 
        }

        .main-area { 
            flex: 1.5; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; width: 100%; 
        }

        .numpad-area { 
            flex: 0.8; width: 100%; max-width: 320px; 
            display: flex; flex-direction: column; gap: 10px; 
        }

        /* DISEÑO VERTICAL PARA MÓVILES */
        @media (max-aspect-ratio: 1/1), (max-width: 768px) {
            .game-layout { flex-direction: column; }
            .main-area { flex: 1.2; justify-content: flex-start; padding-top: 10px; }
            .numpad-area { max-width: 100%; padding-bottom: 10px; flex: 1; }
            .num-display { font-size: 2.2rem !important; padding: 8px 15px !important; margin-bottom: 10px !important; }
            .slot { height: 50px !important; font-size: 1.8rem !important; }
            .valor-input { height: 55px !important; font-size: 1.3rem !important; }
            .tag-valor-label { font-size: 0.5rem !important; }
        }

        .num-display {
            font-size: 3.5rem; font-weight: 900; color: var(--primary);
            background: var(--bg-ui); padding: 15px 40px; border-radius: 20px;
            border: 4px solid #e2e8f0; margin-bottom: 20px; letter-spacing: 2px;
            text-align: center;
        }

        .grid-descomponer { display: grid; gap: 8px; width: 100%; }
        .col { display: flex; flex-direction: column; align-items: center; gap: 5px; min-width: 0; }
        
        .label { width: 100%; text-align: center; color: white; font-weight: bold; padding: 5px 2px; border-radius: 6px; font-size: 0.75rem; white-space: nowrap; }
        
        .c-u { background: #ecc94b; color: #000; } .c-d { background: #f59e0b; } .c-c { background: #ef4444; }
        .c-um { background: #10b981; } .c-dm { background: #3b82f6; } .c-cm { background: #8b5cf6; }
        .c-umi { background: #065f46; } .c-dmi { background: #1e40af; } .c-cmi { background: #4c1d95; }

        .slot, .valor-container {
            width: 100%; border-radius: 10px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-weight: bold; transition: all 0.2s;
            background: white; border: 2px solid #cbd5e1; position: relative;
        }

        .slot { height: 70px; font-size: 2.5rem; }
        
        .valor-container { height: 60px; }
        .valor-input { font-size: 1.5rem; color: #1e40af; width: 100%; text-align: center; }
        
        .tag-valor-label { 
            position: absolute; top: 2px; left: 50%; transform: translateX(-50%);
            font-size: 0.6rem; color: #94a3b8; font-weight: 900; pointer-events: none;
        }

        .active-input { border-color: var(--secondary) !important; background: #f5f3ff !important; transform: scale(1.02); z-index: 5; }
        .is-correct { background: #d1fae5 !important; border-color: var(--success) !important; color: #065f46; }
        .is-wrong { background: #fee2e2 !important; border-color: var(--danger) !important; animation: shake 0.4s; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .key {
            background: white; border: 1px solid #e2e8f0; padding: 14px 0; font-size: 1.6rem;
            font-weight: bold; border-radius: 12px; cursor: pointer;
            box-shadow: 0 4px 0 #cbd5e1; color: var(--primary); transition: 0.1s;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #cbd5e1; }

        .instr-box { background: #eef2ff; color: var(--primary); padding: 10px; border-radius: 12px; margin-bottom: 10px; font-weight: 800; text-align: center; font-size: 1.1rem; width: 100%; border: 2px solid #dbeafe; }
        
        .btn-level { width: 100%; max-width: 350px; padding: 20px; margin: 8px; border: none; border-radius: 15px; color: white; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="#" onclick="location.reload()" class="btn-home">🏠 INICIO</a>
        <div id="level-display" style="font-weight: bold; color: var(--secondary); font-size: 1rem;"></div>
    </div>

    <div id="menu" class="screen active">
        <h1 style="color: var(--primary); font-size: 2.2rem; margin-bottom: 25px; text-align: center;">Descomposición Natural</h1>
        <button class="btn-level" style="background: var(--success)" onclick="startGame(1)">Nivel 1: Centenas</button>
        <button class="btn-level" style="background: #3b82f6" onclick="startGame(2)">Nivel 2: C. de Millar</button>
        <button class="btn-level" style="background: var(--secondary)" onclick="startGame(3)">Nivel 3: C. de Millón</button>
    </div>

    <div id="game" class="screen">
        <div class="instr-box" id="instruccion">PASO 1: COLOCA LAS CIFRAS</div>
        <div class="game-layout">
            <div class="main-area">
                <div id="target-num" class="num-display">0</div>
                <div class="grid-descomponer" id="grid"></div>
            </div>
            <div class="numpad-area">
                <div class="numpad">
                    <button class="key" onclick="pressKey('7')">7</button>
                    <button class="key" onclick="pressKey('8')">8</button>
                    <button class="key" onclick="pressKey('9')">9</button>
                    <button class="key" onclick="pressKey('4')">4</button>
                    <button class="key" onclick="pressKey('5')">5</button>
                    <button class="key" onclick="pressKey('6')">6</button>
                    <button class="key" onclick="pressKey('1')">1</button>
                    <button class="key" onclick="pressKey('2')">2</button>
                    <button class="key" onclick="pressKey('3')">3</button>
                    <button class="key" style="background:#f8fafc" disabled></button>
                    <button class="key" onclick="pressKey('0')">0</button>
                    <button class="key" style="background:#f1f5f9; color:var(--danger)" onclick="deleteContent()">⌫</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let nivel = 1, paso = 1, columnasActivas = [], indiceActual = 0, targetData = {}, bloqueado = false;
    
    // Configuración de audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSfx(freq, type = 'sine', duration = 0.2) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const config = { 
        'cmi': { label: 'C.Mill', class: 'c-cmi', power: 8 },
        'dmi': { label: 'D.Mill', class: 'c-dmi', power: 7 },
        'umi': { label: 'U.Mill', class: 'c-umi', power: 6 },
        'cm': { label: 'C.Millar', class: 'c-cm', power: 5 },
        'dm': { label: 'D.Millar', class: 'c-dm', power: 4 },
        'um': { label: 'U.Millar', class: 'c-um', power: 3 },
        'c': { label: 'C', class: 'c-c', power: 2 },
        'd': { label: 'D', class: 'c-d', power: 1 },
        'u': { label: 'U', class: 'c-u', power: 0 }
    };

    function startGame(n) {
        nivel = n;
        if (n === 1) { 
            columnasActivas = ['c', 'd', 'u'];
            document.getElementById('level-display').innerText = "CENTENAS";
        }
        else if (n === 2) {
            columnasActivas = ['cm', 'dm', 'um', 'c', 'd', 'u'];
            document.getElementById('level-display').innerText = "C. MILLAR";
        }
        else {
            columnasActivas = ['cmi', 'dmi', 'umi', 'cm', 'dm', 'um', 'c', 'd', 'u'];
            document.getElementById('level-display').innerText = "C. MILLÓN";
        }

        document.getElementById('menu').classList.remove('active');
        document.getElementById('game').classList.add('active');
        buildGrid();
        nextExercise();
    }

    function buildGrid() {
        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${columnasActivas.length}, 1fr)`;
        grid.innerHTML = '';
        columnasActivas.forEach(id => {
            const col = document.createElement('div');
            col.className = 'col';
            col.innerHTML = `
                <div class="label ${config[id].class}">${config[id].label}</div>
                <div class="slot" id="slot-${id}"></div>
                <div class="valor-container" id="cont-val-${id}">
                    <span class="tag-valor-label">VALOR</span>
                    <div class="valor-input" id="val-${id}"></div>
                </div>`;
            grid.appendChild(col);
        });
    }

    function nextExercise() {
        paso = 1; indiceActual = 0; bloqueado = false;
        document.getElementById('instruccion').innerText = "PASO 1: COLOCA LAS CIFRAS";
        
        let min = Math.pow(10, (nivel === 1 ? 2 : nivel === 2 ? 4 : 7));
        let max = Math.pow(10, (nivel === 1 ? 3 : nivel === 2 ? 6 : 9)) - 1;

        let num = Math.floor(Math.random() * (max - min + 1) + min);
        let numStr = num.toString().padStart(columnasActivas.length, '0');
        
        document.getElementById('target-num').innerText = num.toLocaleString('es-ES');

        targetData = {};
        columnasActivas.forEach((id, index) => {
            let cifra = numStr[index];
            let valor = (parseInt(cifra) * Math.pow(10, config[id].power)).toString();
            targetData[id] = { cifra, valor };
        });

        columnasActivas.forEach(id => {
            const s = document.getElementById('slot-'+id), v = document.getElementById('val-'+id), cv = document.getElementById('cont-val-'+id);
            s.innerText = ""; s.className = "slot";
            v.innerText = ""; cv.className = "valor-container";
        });
        updateFocusUI();
    }

    function updateFocusUI() {
        document.querySelectorAll('.slot, .valor-container').forEach(el => el.classList.remove('active-input'));
        const id = columnasActivas[indiceActual];
        const targetId = (paso === 1) ? 'slot-' + id : 'cont-val-' + id;
        const el = document.getElementById(targetId);
        if(el) el.classList.add('active-input');
    }

    function pressKey(k) {
        if(bloqueado) return;
        playSfx(440, 'sine', 0.05); // Sonido de tecla
        const id = columnasActivas[indiceActual];
        const el = (paso === 1) ? document.getElementById('slot-' + id) : document.getElementById('val-' + id);
        const container = (paso === 1) ? el : document.getElementById('cont-val-' + id);
        
        if(paso === 1) {
            el.innerText = k;
            validarCasilla(container, k, targetData[id].cifra);
        } else {
            el.innerText += k;
            let uV = el.innerText, tV = targetData[id].valor;
            if((uV === "0" && tV === "0") || uV.length >= tV.length) {
                validarCasilla(container, uV, tV);
            }
        }
    }

    function validarCasilla(el, userVal, targetVal) {
        bloqueado = true;
        if(userVal === targetVal) {
            playSfx(600, 'sine', 0.15); // Sonido acierto
            el.classList.remove('active-input');
            el.classList.add('is-correct');
            setTimeout(() => {
                bloqueado = false;
                if(indiceActual < columnasActivas.length - 1) {
                    indiceActual++;
                    updateFocusUI();
                } else {
                    finalizarPaso();
                }
            }, 150);
        } else {
            playSfx(150, 'sawtooth', 0.4); // Sonido error
            el.classList.add('is-wrong');
            setTimeout(() => {
                el.classList.remove('is-wrong');
                if(paso === 1) el.innerText = "";
                else el.querySelector('.valor-input').innerText = "";
                bloqueado = false;
            }, 600);
        }
    }

    function finalizarPaso() {
        if(paso === 1) {
            paso = 2; indiceActual = 0;
            document.getElementById('instruccion').innerText = "PASO 2: ESCRIBE EL VALOR";
            updateFocusUI();
        } else {
            playSfx(1000, 'sine', 0.5); // Sonido ejercicio completado
            setTimeout(nextExercise, 800);
        }
    }

    function deleteContent() {
        if(bloqueado) return;
        const id = columnasActivas[indiceActual];
        const el = (paso === 1) ? document.getElementById('slot-' + id) : document.getElementById('val-' + id);
        el.innerText = "";
    }
</script>
</body>
</html>
